# Local development — db + redis + backend (+ celery)
# Frontend: cd frontend && npm run dev  (http://localhost:3000)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dio
      POSTGRES_USER: dio
      POSTGRES_PASSWORD: dio
    ports:
      - '5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dio -d dio']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - '8000:8000'
    environment:
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: 'True'
      DB_NAME: dio
      DB_USER: dio
      DB_PASSWORD: dio
      DB_HOST: db
      DB_PORT: '5432'
      REDIS_URL: redis://redis:6379/0
      TEACHER_INVITE_CODE: dev-teacher-invite
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      FRONTEND_URL: http://localhost:3000
      EMAIL_HOST_USER: ''
      EMAIL_HOST_PASSWORD: ''
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker --loglevel=info
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: 'True'
      DB_NAME: dio
      DB_USER: dio
      DB_PASSWORD: dio
      DB_HOST: db
      DB_PORT: '5432'
      REDIS_URL: redis://redis:6379/0
      TEACHER_INVITE_CODE: dev-teacher-invite
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      FRONTEND_URL: http://localhost:3000
      EMAIL_HOST_USER: ''
      EMAIL_HOST_PASSWORD: ''
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_dev_data:
  backend_media:
